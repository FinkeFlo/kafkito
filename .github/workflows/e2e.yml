name: E2E

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Install Playwright chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        working-directory: frontend
        run: bunx playwright install-deps chromium

      - name: Run e2e harness
        run: make e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces and videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 14

      - name: Upload kafkito-e2e log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kafkito-e2e-log
          path: /tmp/kafkito-e2e.log
          retention-days: 7

      - name: Tear down kafkito-e2e (best-effort)
        if: always()
        run: make e2e-down || true
