name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        tags: ["", "btp"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build -tags "${{ matrix.tags }}" ./...
      - run: go test -tags "${{ matrix.tags }}" ./...
      - if: matrix.tags == ''
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build
      - run: bun run check:palette

  docker-build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        build_tags: ["", "btp"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: docker build --build-arg BUILD_TAGS="${{ matrix.build_tags }}" -t "kafkito:ci-${{ matrix.build_tags || 'default' }}" .

  dco:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: tisonkun/actions-dco@v1.1
