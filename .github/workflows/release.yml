name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant:
          - { name: default, tagSuffix: "",      tags: "" }
          - { name: btp,     tagSuffix: "-btp",  tags: "btp" }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.variant.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_TAGS=${{ matrix.variant.tags }}
          tags: |
            ghcr.io/finkeflo/kafkito:${{ github.ref_name }}${{ matrix.variant.tagSuffix }}

  binaries:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: oven-sh/setup-bun@v2
      - name: Build frontend
        working-directory: frontend
        run: bun install --frozen-lockfile && bun run build
      - name: Build matrix
        run: |
          mkdir dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              [ "$os" = "windows" ] && [ "$arch" = "arm64" ] && continue
              ext=""; [ "$os" = "windows" ] && ext=".exe"
              GOOS=$os GOARCH=$arch go build -o "dist/kafkito-${os}-${arch}${ext}" ./cmd/kafkito
            done
          done
          (cd dist && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
