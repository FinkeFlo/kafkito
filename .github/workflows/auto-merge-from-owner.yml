name: Auto-merge owner PRs

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.user.login == 'FinkeFlo' && !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    steps:
      - name: Enable auto-merge (rebase strategy)
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --rebase "$PR_URL"
