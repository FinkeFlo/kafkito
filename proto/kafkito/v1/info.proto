syntax = "proto3";

package kafkito.v1;

option go_package = "github.com/FinkeFlo/kafkito/pkg/proto/kafkito/v1;kafkitov1";

// InfoService exposes static build/runtime information.
service InfoService {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  string name = 1;
  string version = 2;
}
