# Local dev stack for kafkito.
#
# Ports are deliberately non-standard to avoid clashes with other local tooling
# (see plan.md "Lokale Ports" table). Always prefer these:
#   - kafkito:         http://localhost:37421
#   - Kafka broker:    localhost:39092   (external PLAINTEXT)
#   - Schema Registry: http://localhost:38081
#   - Keycloak (auth): http://localhost:38080 (profile: auth)
#
# Usage:
#   docker compose up -d                         # Kafka + Schema Registry only
#   docker compose --profile app up -d           # + kafkito container
#   docker compose --profile auth up -d          # + Keycloak
#   docker compose --profile app --profile auth up -d

name: kafkito-dev

services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafkito-kafka
    hostname: kafka
    ports:
      - "39092:39092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:39092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: kafkito-dev-cluster-1
    healthcheck:
      test:
        - CMD-SHELL
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.2
    container_name: kafkito-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "38081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  kafkito:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: 0.0.0-dev
    container_name: kafkito
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "37421:37421"
    environment:
      PORT: "37421"
      KAFKITO_KAFKA_BROKERS: "kafka:9092"

  keycloak:
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:26.0
    container_name: kafkito-keycloak
    command: start-dev
    ports:
      - "38080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
